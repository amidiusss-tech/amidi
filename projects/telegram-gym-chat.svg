<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Telegram gym chat artwork</title>
  <desc id="desc">A bold square poster with muscular male silhouettes training in the gym and the slogan two times a week.</desc>
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#43170f"/>
      <stop offset="45%" stop-color="#1a0f0c"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd67a"/>
      <stop offset="45%" stop-color="#ff8b3d"/>
      <stop offset="100%" stop-color="#b63216"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d3d5da"/>
      <stop offset="50%" stop-color="#8d939f"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="banner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5b0f07"/>
      <stop offset="50%" stop-color="#b52a13"/>
      <stop offset="100%" stop-color="#5b0f07"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#ff7d2e" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  <rect width="1024" height="1024" fill="url(#grid)"/>
  <path d="M 0 210 L 1024 30 L 1024 150 L 0 330 Z" fill="rgba(255,255,255,0.035)"/>
  <path d="M 0 820 L 1024 650 L 1024 760 L 0 930 Z" fill="rgba(255,255,255,0.03)"/>

  <rect x="34" y="34" width="956" height="956" rx="54" fill="none" stroke="url(#metal)" stroke-width="8" opacity="0.9"/>
