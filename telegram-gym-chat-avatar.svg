  <rect x="120" y="310" width="45" height="138" rx="8" fill="#e94560" stroke="#c81d42" stroke-width="2"/>
  <rect x="90" y="320" width="35" height="118" rx="6" fill="#c81d42" stroke="#a01535" stroke-width="2"/>
  <rect x="60" y="335" width="35" height="88" rx="6" fill="#e94560" stroke="#c81d42" stroke-width="2"/>
  <rect x="635" y="310" width="45" height="138" rx="8" fill="#e94560" stroke="#c81d42" stroke-width="2"/>
  <rect x="675" y="320" width="35" height="118" rx="6" fill="#c81d42" stroke="#a01535" stroke-width="2"/>
  <rect x="705" y="335" width="35" height="88" rx="6" fill="#e94560" stroke="#c81d42" stroke-width="2"/>

  <g filter="url(#shadow)">
