    <path d="M720 200 L700 260 L715 260 L695 330" stroke="#ffd700" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <g filter="url(#strongGlow)" opacity="0.6">
    <path d="M320 700 Q310 650 330 620 Q315 660 325 680 Z" fill="#e94560"/>
    <path d="M480 700 Q490 650 470 620 Q485 660 475 680 Z" fill="#e94560"/>
    <path d="M350 710 Q345 670 360 640 Q348 665 355 690 Z" fill="#ff6b35"/>
    <path d="M450 710 Q455 670 440 640 Q452 665 445 690 Z" fill="#ff6b35"/>
