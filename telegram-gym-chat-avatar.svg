    <rect x="385" y="510" width="30" height="20" rx="4" fill="#d4a574"/>
    <path d="M340 530 L460 530 L445 650 L355 650 Z" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="1"/>
    <path d="M360 540 L400 555 L440 540" fill="none" stroke="#3a3a5a" stroke-width="2"/>
    <path d="M340 530 L280 480 L240 390" stroke="#d4a574" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <ellipse cx="300" cy="490" rx="22" ry="18" fill="#d4a574"/>
    <path d="M460 530 L520 480 L560 390" stroke="#d4a574" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <ellipse cx="500" cy="490" rx="22" ry="18" fill="#d4a574"/>
    <path d="M355 645 L345 720 L375 720 L400 670 L425 720 L455 720 L445 645 Z" fill="#1a1a3e"/>
    <path d="M360 720 L355 780" stroke="#d4a574" stroke-width="24" stroke-linecap="round" fill="none"/>
    <path d="M440 720 L445 780" stroke="#d4a574" stroke-width="24" stroke-linecap="round" fill="none"/>
  </g>

  <g filter="url(#glow)">
