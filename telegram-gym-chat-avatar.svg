    <line x1="400" y1="400" x2="800" y2="200" stroke="#e94560" stroke-width="2"/>
    <line x1="400" y1="400" x2="800" y2="600" stroke="#e94560" stroke-width="2"/>
    <line x1="400" y1="400" x2="600" y2="800" stroke="#e94560" stroke-width="2"/>
    <line x1="400" y1="400" x2="200" y2="800" stroke="#e94560" stroke-width="2"/>
    <line x1="400" y1="400" x2="0" y2="600" stroke="#e94560" stroke-width="2"/>
    <line x1="400" y1="400" x2="0" y2="200" stroke="#e94560" stroke-width="2"/>
