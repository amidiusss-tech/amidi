    <rect x="-40" y="-14" width="14" height="28" rx="3" fill="#e94560"/>
    <rect x="26" y="-14" width="14" height="28" rx="3" fill="#e94560"/>
  </g>

  <g fill="#ffd700" filter="url(#glow)">
    <polygon points="400,750 407,770 428,770 411,782 418,802 400,790 382,802 389,782 372,770 393,770" opacity="0.9"/>
    <polygon points="300,760 305,773 318,773 307,781 311,794 300,786 289,794 293,781 282,773 295,773" opacity="0.6" transform="scale(0.7) translate(128,350)"/>
    <polygon points="500,760 505,773 518,773 507,781 511,794 500,786 489,794 493,781 482,773 495,773" opacity="0.6" transform="scale(0.7) translate(214,350)"/>
  </g>

  <rect x="5" y="5" width="790" height="790" rx="20" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.5"/>
  <rect x="15" y="15" width="770" height="770" rx="15" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3"/>
