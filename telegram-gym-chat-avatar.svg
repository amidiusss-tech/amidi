<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8a8a8a"/>
      <stop offset="30%" style="stop-color:#c0c0c0"/>
      <stop offset="70%" style="stop-color:#a0a0a0"/>
      <stop offset="100%" style="stop-color:#707070"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c81d42"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <g opacity="0.08">
    <line x1="0" y1="0" x2="800" y2="800" stroke="#ffd700" stroke-width="40"/>
    <line x1="-200" y1="0" x2="600" y2="800" stroke="#ffd700" stroke-width="40"/>
    <line x1="200" y1="0" x2="1000" y2="800" stroke="#ffd700" stroke-width="40"/>
    <line x1="-400" y1="0" x2="400" y2="800" stroke="#ffd700" stroke-width="40"/>
    <line x1="400" y1="0" x2="1200" y2="800" stroke="#ffd700" stroke-width="40"/>
  </g>

  <g opacity="0.12">
    <line x1="400" y1="400" x2="400" y2="0" stroke="#e94560" stroke-width="3"/>
    <line x1="400" y1="400" x2="800" y2="0" stroke="#e94560" stroke-width="3"/>
    <line x1="400" y1="400" x2="800" y2="400" stroke="#e94560" stroke-width="3"/>
    <line x1="400" y1="400" x2="800" y2="800" stroke="#e94560" stroke-width="3"/>
    <line x1="400" y1="400" x2="400" y2="800" stroke="#e94560" stroke-width="3"/>
    <line x1="400" y1="400" x2="0" y2="800" stroke="#e94560" stroke-width="3"/>
    <line x1="400" y1="400" x2="0" y2="400" stroke="#e94560" stroke-width="3"/>
