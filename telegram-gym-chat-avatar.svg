  <text x="400" y="140" font-family="Impact, Arial Black, sans-serif" font-size="90" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="12" filter="url(#glow)" stroke="#ff8c00" stroke-width="2">ALPHA</text>

  <text x="400" y="230" font-family="Impact, Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#fire)" text-anchor="middle" letter-spacing="8" filter="url(#glow)" stroke="#c81d42" stroke-width="2">&#x041A;&#x0410;&#x0427;&#x0410;&#x041B;&#x041A;&#x0410;</text>

  <g transform="translate(400, 290)">
    <rect x="-160" y="-30" width="320" height="50" rx="25" fill="url(#redGlow)" filter="url(#glow)"/>
    <text x="0" y="8" font-family="Impact, Arial Black, sans-serif" font-size="30" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="3">2x &#x0412; &#x041D;&#x0415;&#x0414;&#x0415;&#x041B;&#x042E;</text>
  </g>

  <g transform="translate(120, 700) rotate(-30)">
    <rect x="-30" y="-5" width="60" height="10" rx="5" fill="url(#steel)"/>
    <rect x="-40" y="-14" width="14" height="28" rx="3" fill="#e94560"/>
    <rect x="26" y="-14" width="14" height="28" rx="3" fill="#e94560"/>
